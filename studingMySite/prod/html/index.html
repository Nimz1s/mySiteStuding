<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../styles/style.css">
    <script src="../js/calc.js" defer></script>
    <title>Document</title>
</head>
<body>
    <div class="main">
        <div style="justify-content: flex-end;">
            <p id="res">0</p>
        </div>
        <div>
            <button class="button-op" data-type="clear">ac</button>
            <button class="button-op" data-type="change">+/-</button>
            <button class="button-op" data-type="op">%</button>
            <button class="button-op" data-type="op">/</button>
        </div>
        <div>
            <button data-type="num">7</button>
            <button data-type="num">8</button>
            <button data-type="num">9</button>
            <button class="button-op" data-type="op">x</button>
        </div>
        <div>
            <button data-type="num">4</button>
            <button data-type="num">5</button>
            <button data-type="num">6</button>
            <button class="button-op" data-type="op">+</button>
        </div>
        <div>
            <button data-type="num">1</button>
            <button data-type="num">2</button>
            <button data-type="num">3</button>
            <button class="button-op" data-type="op">-</button>
        </div>
        <div>
            <button style="width: 100px;" data-type="num">0</button>
            <button data-type="dot">.</button>
            <button class="button-op" data-type="equal">=</button>
        </div>
    </div>
    <div>
        <p>a: </p>
        <p id="a">a</p>
    </div>
    <div>
        <p>b: </p>
        <p id="b">b</p>
    </div>
</body>
</html>
